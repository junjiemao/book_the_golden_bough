name: Deploy Quartz to Cloudflare Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Quartz
        uses: konstfish/quartz-build-action@v7
        env:
          QUARTZ_BASE_URL: ${{ vars.QUARTZ_BASE_URL || 'xmatrix.github.io/golden_bough' }}
        with:
          source: golden_bough
          destination: _site
          page_title: ${{ vars.QUARTZ_PAGE_TITLE || 'The Golden Bough' }}
          quartz_config: .github/quartz/quartz.config.ts
          quartz_layout: .github/quartz/quartz.layout.ts
          quartz_repo_ref: v4
          quartz_custom_css: .github/quartz/custom.scss

      - name: Ensure Cloudflare Pages Project
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --production-branch main

      - name: Deploy Site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch ${{ github.ref_name }} --commit-dirty=true
